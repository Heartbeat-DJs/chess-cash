# Render Blueprint — ChessCash full app (website + multiplayer relay)
# in ONE service on ONE URL. No separate relay, no env config needed.
#
# Deploy: push to GitHub, then on render.com → New → Blueprint → pick the
# repo. Or create a Web Service from the public repo URL with the build/start
# commands below.
services:
  - type: web
    name: chesscash
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
